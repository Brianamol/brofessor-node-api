# ─────────────────────────────────────────────────────────────────────────────
#  Local development stack
#  Run: docker compose up -d
#  This starts MySQL, Redis, and Keycloak locally.
#  The Node.js backend runs outside Docker (with: npm run dev)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL 8 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: marketplace_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: marketplace
      MYSQL_USER: marketplace_user
      MYSQL_PASSWORD: marketplace_pass
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: marketplace_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ── Keycloak ──────────────────────────────────────────────────────────────
  keycloak-db:
    image: postgres:15-alpine
    container_name: marketplace_keycloak_db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: marketplace_keycloak
    ports:
      - "8180:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Admin1234!
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_HOSTNAME: localhost
    command: start-dev
    depends_on:
      - keycloak-db
    volumes:
      - keycloak_data:/opt/keycloak/data

  # ── phpMyAdmin (optional, for DB browsing) ────────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: marketplace_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - mysql

volumes:
  mysql_data:
  redis_data:
  keycloak_pg_data:
  keycloak_data: